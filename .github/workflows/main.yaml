# IAM Permissions & Policies needed for the GitHub Actions workflow:
# For GitHub_Actions Role:
# - AmazonEKSClusterPolicy
# - AWSAppRunnerServicePolicyForECRAccess
# - ECRPushPermissions (Custom Policy): See below for the exact JSON Policy

# Cluster Access policy for IAM Github_Actions Role:
# Configure IAM access entry
# - IAM principal: GitHub_Actions (the role created for GitHub Actions to assume)
# - Type: Standard
# - Access Policies:
#   - AmazonEKSEditPolicy (Allows GitHub Actions to update the EKS deployment with the new Docker image)

# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
name: Deploy Frontend to EKS

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

# Define environment variables for AWS and deployment settings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AWS_REGION: "us-east-1"
  ECR_REPOSITORY: "lab-2-sjb-frontend-ecr-repo"
  EKS_CLUSTER_NAME: "lab-2-sjb--main-eks-cluster"
  DEPLOYMENT_NAME: "lab-2-sjb--frontend"
  CONTAINER_NAME: "frontend-container"

# Set permissions for GitHub Actions to interact with AWS and the repository
permissions:
  id-token: "write"
  contents: "read"

# Define the jobs for deployment
jobs:
  # Deployment job that builds the Docker image, pushes it to ECR, and updates the EKS deployment
  deploy:
    name: "Build, Push, and Update EKS"
    runs-on: "ubuntu-latest"
    steps:
      # Checkout the code from the repository
      - name: "Checkout Code"
        # This action checks out the repository code so that it can be used in subsequent steps for building the Docker image
        uses: "actions/checkout@v4"

      # Configure AWS credentials using a role that GitHub Actions can assume
      - name: "Configure AWS Credentials"
        uses: "aws-actions/configure-aws-credentials@v4"
        with:
          # This role has been manually created in the AWS account to allow GitHub Actions to assume it for deployment purposes
          role-to-assume: "arn:aws:iam::987470856504:role/GitHub_Actions"
          aws-region: "${{ env.AWS_REGION }}"

      # Log in to Amazon ECR to allow pushing the Docker image
      - name: "Login to Amazon ECR"
        id: "login-ecr"
        # Configure the AWS credentials to authenticate with Amazon ECR
        uses: "aws-actions/amazon-ecr-login@v2"

      # Build the Docker image, tag it with the GitHub SHA, and push it to ECR
      - name: "Build, Tag, and Push Docker Image"
        id: "build-image"
        env:
          # Set the ECR registry URL and image tag for the Docker image
          ECR_REGISTRY: "${{ steps.login-ecr.outputs.registry }}"
          IMAGE_TAG: "${{ github.sha }}"
          # The ECR repository name is defined in the environment variables and will be used to tag the Docker image appropriately
          # The Docker image is built using the Dockerfile in the repository, tagged with the ECR registry and repository name, and then pushed to Amazon ECR. 
          # The image URL is also set as an output for use in subsequent steps.
        run: |
          docker build -t "$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG"
          echo "image=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      # Update the kubeconfig to allow kubectl to interact with the EKS cluster
      - name: "Update EKS Kubeconfig"
        run: |
          aws eks update-kubeconfig --name "${{ env.EKS_CLUSTER_NAME }}" --region "${{ env.AWS_REGION }}"

      # Set the new image in the Kubernetes deployment and wait for the rollout to complete
      - name: "Deploy New Image to EKS Nodes"
        env:
          # The IMAGE variable is set to the output from the previous step where the Docker image was built and pushed to ECR.
          IMAGE: "${{ steps.build-image.outputs.image }}"
        run: |
          kubectl set image "deployment/${{ env.DEPLOYMENT_NAME }}" "${{ env.CONTAINER_NAME }}=$IMAGE"
          kubectl rollout status "deployment/${{ env.DEPLOYMENT_NAME }}"


